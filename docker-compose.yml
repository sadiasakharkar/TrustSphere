version: "3.9"

services:
  security-api:
    build:
      context: .
      dockerfile: Dockerfile.security-api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - redis
      - mlflow
    restart: unless-stopped

  security-worker:
    build:
      context: .
      dockerfile: Dockerfile.security-worker
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
